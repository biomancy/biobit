[workspace]
channels = ["conda-forge"]
name = "biobit"
platforms = ["linux-64"]

[environments]
default = ["docs", "rust", "python", "py-3-14t"]   # Full development environment with the latest Python
docs = ["docs", "py-3-14t"]                        # Minimal env for documentation
rust = ["rust", "py-3-14t"]                        # Rust-only environment

# Python-specific environments
py-3-14t = ["rust", "python", "py-3-14t"]

# Common tasks
[tasks]
ci = { depends-on = ["build-docs", "rs-ci", "py-ci"] }  # Run all CI tasks

########################################################################################################################
# Docs [mkdocs]
########################################################################################################################
[feature.docs.pypi-dependencies]
mkdocs = "==1.6.1"
mkdocs-material = "==9.7.6"

[feature.docs.tasks]
build-docs = { cmd = "mkdocs build", cwd = "biobit/docs" }

########################################################################################################################
# Rust
########################################################################################################################
[feature.rust.dependencies]
rust = "==1.94.0"               # .pixi/envs/default/bin
rust-src = "==1.94.0"           # .pixi/envs/default/lib/rustlib/src/rust

[feature.rust.tasks]
rs-upgrade = "cargo upgrade --incompatible allow && cargo update"
rs-ci-fmt = "cargo fmt --all -- --check"
rs-ci-check = "cargo check --all-features"
rs-ci-clippy = "cargo clippy --all-features"
rs-ci-test = "cargo test --all-features"
rs-ci = { depends-on = ["rs-ci-fmt", "rs-ci-check", "rs-ci-clippy", "rs-ci-test"] }

[feature.rust.tasks.code2prompt]
cmd = [
    "code2prompt", "--full-directory-tree", "--sort", "name_asc",
    "--exclude", "biobit/docs/site", "--exclude", "target", "--exclude", "resources", "--exclude", "obsolete",
    "--exclude", "pixi.lock", "--exclude", "Cargo.lock", "--exclude", "llm-context.md",
    "-O", "llm-context.md", "."
]

########################################################################################################################
# Python
########################################################################################################################
[feature.python.dependencies]
pixi-pycharm = "==0.0.11"
pip = "==26.0.1"

[feature.python.tasks]
py-ci-ruff = "ruff check"
py-ci-mypy = { cmd = "mypy --config-file pyproject.toml .", cwd = "biobit/py" }
py-ci-build = { cmd = "maturin develop", cwd = "biobit/py", depends-on = ["py-ci-ruff", "py-ci-mypy"] }
py-ci-test = { cmd = "pytest -v -x biobit/py", depends-on = ["py-ci-build"] }
py-ci = { depends-on = ["py-ci-test"] }

[feature.python.pypi-dependencies]
mypy = "==1.20.1"
ruff = "==0.15.11"
maturin = "==1.13.1"
pytest = "==9.0.3"
pytest-env = "==1.6.0"
attrs = "==26.1.0"
cattrs = { version = "==26.1.0", extras = ["pyyaml"] }
PyYAML = "==6.0.3"
pandas = "==3.0.2"
pandas-stubs = "==3.0.0.260204"

[feature.py-3-14t.dependencies]
python-freethreading = "==3.14.4"
